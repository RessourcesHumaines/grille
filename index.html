<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>System Hacked</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: black;
        color: red;
    }

    /* Image en fond */
    .background {
        position: fixed;
        width: 110%;
        height: 110%;
        background: url('img.jpg') no-repeat center center;
        background-size: cover;
        animation: zoomMove 10s infinite alternate ease-in-out;
        filter: brightness(0.5) contrast(1.2);
    }

    /* Animation zoom + mouvement */
    @keyframes zoomMove {
        0% { transform: scale(1) translate(0,0); }
        100% { transform: scale(1.2) translate(-20px, -20px); }
    }

    /* Effet glitch */
    .glitch {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 50px;
        font-weight: bold;
        animation: glitch 1s infinite;
    }

    @keyframes glitch {
        0% { text-shadow: 2px 2px red; }
        20% { text-shadow: -2px -2px cyan; }
        40% { text-shadow: 2px -2px red; }
        60% { text-shadow: -2px 2px cyan; }
        80% { text-shadow: 2px 2px red; }
        100% { text-shadow: -2px -2px cyan; }
    }

    /* Texte secondaire */
    .message {
        position: absolute;
        bottom: 20%;
        width: 100%;
        text-align: center;
        font-size: 20px;
        opacity: 0;
        animation: fadeIn 4s forwards;
        animation-delay: 2s;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    /* flash écran */
    .flash {
        position: fixed;
        width: 100%;
        height: 100%;
        background: white;
        opacity: 0;
        animation: flashAnim 0.3s;
        animation-delay: 1.5s;
    }

    @keyframes flashAnim {
        0% { opacity: 1; }
        100% { opacity: 0; }
    }
</style>

</head>

<body>

<div class="background"></div>
<div class="flash"></div>

<div class="glitch">⚠️ SYSTEM HACKED ⚠️</div>

<div class="message">
    Votre action a exposé le système.<br>
    Un attaquant aurait pu prendre le contrôle de votre poste.<br>
    Chaque clic compte. Restez vigilant.
</div>

<!-- Son hacker -->
<audio id="sound">
    <source src="https://www.myinstants.com/media/sounds/windows-error.mp3" type="audio/mpeg">
</audio>

<script>
    window.onload = function() {
        document.getElementById("sound").play();
    };
</script>

</body>
</html>
